appId: com.pikume.mobile
name: Home calendar smoke
---
- launchApp:
    clearState: true
    clearKeychain: true
- tapOn:
    id: "bottom-tab-login"
- tapOn:
    id: "login-email-input"
- inputText: "test@gmail.com"
- tapOn:
    id: "login-password-visibility-toggle"
- tapOn:
    id: "login-password-input"
- inputText: "1"
- tapOn:
    id: "login-submit-button"
- assertVisible:
    id: "home-calendar-grid"
- assertVisible:
    id: "home-month-picker-toggle"
- tapOn:
    id: "home-friend-next-button"
- assertVisible:
    id: "home-viewed-user-name"
- tapOn:
    id: "home-friend-prev-button"
- assertVisible:
    id: "home-viewed-user-name"
- tapOn:
    id: "home-calendar-current-day-1"
- assertVisible:
    id: "compose-selected-date"
